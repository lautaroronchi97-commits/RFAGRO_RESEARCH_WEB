name: Ingesta pizarra Rosario (CAC → Supabase)

# Mantiene al día la tabla pizarra_historico con la pizarra de la Cámara Arbitral
# de Cereales de Rosario (soja/maíz/trigo/girasol/sorgo, en $ y US$).
# Corre cada día hábil a la mañana (cuando la CAC publica) y también se puede lanzar a mano.
# Tres corridas 10:30/10:45/11:00 ART: si la pizarra del día aún no salió a las 10:30, la agarra la
# de 10:45 u 11:00. El script es idempotente (ventana móvil de 10 días + upsert por (grano,fecha)),
# así que re-correr es inocuo: la primera que tenga el dato lo mete y las otras re-pisan igual.
# Los `schedule` de GitHub Actions corren desde la rama default del repo.

on:
  schedule:
    - cron: "30 13 * * 1-5" # 10:30 ART
    - cron: "45 13 * * 1-5" # 10:45 ART (reintento si aún no había datos)
    - cron: "0 14 * * 1-5" #  11:00 ART (reintento final; a esta hora ya debería estar)
  workflow_dispatch:
    inputs:
      from:
        description: "Fecha desde (YYYY-MM-DD) — para backfill manual"
        required: false
      to:
        description: "Fecha hasta (YYYY-MM-DD)"
        required: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Ingesta
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.from }}" ]; then
            node scripts/ingest-pizarra.mjs --from "${{ github.event.inputs.from }}" --to "${{ github.event.inputs.to }}"
          else
            node scripts/ingest-pizarra.mjs --days 10
          fi
