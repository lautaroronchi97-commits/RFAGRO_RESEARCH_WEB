name: Ingesta cierres granos (CEM → Supabase)

# Mantiene al día la tabla futuros_cierres con los cierres de A3/Matba ROFEX.
# Corre después del cierre de la rueda (L-V) y también se puede lanzar a mano.
# Los `schedule` de GitHub Actions corren desde la rama default del repo.

# El GITHUB_TOKEN no se usa (todo va por secrets de Supabase) → mínimo privilegio (E5 #12d).
permissions:
  contents: read

on:
  schedule:
    - cron: "0 23 * * 1-5" # 23:00 UTC = 20:00 ART, tras el cierre
  workflow_dispatch:
    inputs:
      from:
        description: "Fecha desde (YYYY-MM-DD) — para backfill manual"
        required: false
      to:
        description: "Fecha hasta (YYYY-MM-DD)"
        required: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
      - name: Ingesta
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.from }}" ]; then
            node scripts/ingest-cierres.mjs --from "${{ github.event.inputs.from }}" --to "${{ github.event.inputs.to }}"
          else
            node scripts/ingest-cierres.mjs --days 5
          fi
      - name: Avisar por mail si falló (E5 #7)
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: node scripts/alerta-mail.mjs --workflow "${{ github.workflow }}" --run "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
