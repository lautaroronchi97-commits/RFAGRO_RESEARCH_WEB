name: Ingesta cierres granos (CEM → Supabase)

# Mantiene al día la tabla futuros_cierres con los cierres de A3/Matba ROFEX.
# Corre después del cierre de la rueda (L-V) y también se puede lanzar a mano.
# Los `schedule` de GitHub Actions corren desde la rama default del repo.

on:
  schedule:
    - cron: "0 23 * * 1-5" # 23:00 UTC = 20:00 ART, tras el cierre
  workflow_dispatch:
    inputs:
      from:
        description: "Fecha desde (YYYY-MM-DD) — para backfill manual"
        required: false
      to:
        description: "Fecha hasta (YYYY-MM-DD)"
        required: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Ingesta
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.from }}" ]; then
            node scripts/ingest-cierres.mjs --from "${{ github.event.inputs.from }}" --to "${{ github.event.inputs.to }}"
          else
            node scripts/ingest-cierres.mjs --days 5
          fi
